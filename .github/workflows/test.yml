name: Integration Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Cache npm dependencies
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: npm-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      - name: Build plugin
        run: |
          npm ci
          npm run build

      - name: Unit tests
        run: node --test tests/unit/index.test.mjs

      - name: Check cloud integration secret
        id: cloud-secret
        env:
          OLLAMA_CLOUD_API_KEY: ${{ secrets.OLLAMA_CLOUD_API_KEY }}
          LEGACY_OLLAMA_CLOUD_APIKEY: ${{ secrets.OLLAMA_CLOUD_APIKEY }}
        run: |
          if [ -n "${OLLAMA_CLOUD_API_KEY:-}" ]; then
            echo "available=true" >> "$GITHUB_OUTPUT"
            echo "secret_name=OLLAMA_CLOUD_API_KEY" >> "$GITHUB_OUTPUT"
            echo "Ollama Cloud integration secret is configured"
          elif [ -n "${LEGACY_OLLAMA_CLOUD_APIKEY:-}" ]; then
            echo "available=true" >> "$GITHUB_OUTPUT"
            echo "secret_name=OLLAMA_CLOUD_APIKEY" >> "$GITHUB_OUTPUT"
            echo "Ollama Cloud integration secret is configured using legacy name OLLAMA_CLOUD_APIKEY"
          else
            echo "available=false" >> "$GITHUB_OUTPUT"
            echo "secret_name=" >> "$GITHUB_OUTPUT"
            echo "::notice title=Cloud integration skipped::OLLAMA_CLOUD_API_KEY or legacy OLLAMA_CLOUD_APIKEY secret is not configured or is unavailable for this event"
          fi

      - name: Install OpenCode
        if: ${{ steps.cloud-secret.outputs.available == 'true' }}
        timeout-minutes: 3
        run: npm install -g opencode-ai

      - name: Deep test - OpenCode run integration
        id: deep-test
        if: ${{ steps.cloud-secret.outputs.available == 'true' }}
        continue-on-error: ${{ github.event_name != 'workflow_dispatch' }}
        timeout-minutes: 6
        env:
          NON_VISION_MODEL: qwen3.5:cloud
          IMAGE_COMPREHENSION_MODEL: gemma4:31b
          OLLAMA_CLOUD_API_KEY: ${{ secrets.OLLAMA_CLOUD_API_KEY }}
          LEGACY_OLLAMA_CLOUD_APIKEY: ${{ secrets.OLLAMA_CLOUD_APIKEY }}
          OPENCODE_DISABLE_DEFAULT_PLUGINS: "true"
          OPENCODE_FAKE_VCS: git
          DEBUG_OPENCODE: "1"
        run: |
          npx tsx tests/integration/deep-test.ts

      - name: Report optional cloud integration failure
        if: ${{ always() && steps.cloud-secret.outputs.available == 'true' && steps.deep-test.outcome != 'success' && github.event_name != 'workflow_dispatch' }}
        run: |
          echo "::warning title=Optional cloud integration failed::The Ollama Cloud deep test failed using ${SECRET_NAME}. Push and pull_request workflows keep this non-blocking; run this workflow manually after fixing the secret to enforce the cloud integration gate."
        env:
          SECRET_NAME: ${{ steps.cloud-secret.outputs.secret_name }}
