name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      matrix:
        node-version: [20, 22, 24]

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      - name: Install dependencies
        run: npm ci

      - name: Format check
        run: npm run format:check

      - name: Build
        run: npm run build

      - name: Unit tests
        run: node --test tests/unit/index.test.mjs

      - name: Shell syntax check
        run: bash -n tests/integration/quick-test.sh tests/integration/setup-ci.sh tests/integration/docker-packed-install-test.sh

      - name: Package dry run
        run: npm pack --dry-run
